<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Countdown App</title>

<link rel="manifest" href="manifest.json">

<style>
body{
    margin:0;
    font-family:tahoma;
    background:#0b1220;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.card{
    background:#111a2e;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

#timer{
    font-size:60px;
    margin:20px 0;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin:5px;
}
</style>
</head>

<body>

<div class="card">
    <h2>Countdown App</h2>
    <div id="timer">--:--:--</div>

    <button onclick="login()">Admin</button>
</div>

<div id="admin" style="display:none;margin-top:20px;">
    <input type="datetime-local" id="time">
    <button onclick="save()">Save</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "XXX",
  appId: "XXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const PASSWORD = "1234";

let endTime = null;

db.ref("endTime").on("value", snap=>{
    endTime = snap.val();
});

function update(){
    if(!endTime){
        document.getElementById("timer").innerHTML="No Time";
        return;
    }

    const diff = new Date(endTime) - new Date();

    if(diff <= 0){
        document.getElementById("timer").innerHTML="DONE 🎉";
        return;
    }

    const d = Math.floor(diff/86400000);
    const h = Math.floor(diff%86400000/3600000);
    const m = Math.floor(diff%3600000/60000);
    const s = Math.floor(diff%60000/1000);

    document.getElementById("timer").innerHTML =
    `${d}d ${h}h ${m}m ${s}s`;
}

setInterval(update,1000);

function login(){
    let p = prompt("Password:");
    if(p === PASSWORD){
        document.getElementById("admin").style.display="block";
    }
}

function save(){
    let val = document.getElementById("time").value;
    db.ref("endTime").set(val);
    alert("Saved!");
}

</script>

<script>
if('serviceWorker' in navigator){
    navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
