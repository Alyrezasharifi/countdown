<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown SaaS</title>

<style>
body{
  margin:0;
  font-family:tahoma;
  background:#0b1220;
  color:white;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:#111a2e;
  padding:20px;
  border-radius:15px;
  margin:10px 0;
}

input, button{
  padding:10px;
  margin:5px;
  border-radius:10px;
}

a{color:#38bdf8}

#timer{
  font-size:60px;
}
</style>
</head>

<body>

<div class="container">

<h2>⚡ Countdown SaaS</h2>

<!-- LOGIN -->
<div id="loginBox">
  <h3>Login</h3>
  <input id="email" placeholder="email">
  <input id="password" type="password" placeholder="password">
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">

  <h3>Create Event</h3>
  <input id="title" placeholder="Event title">
  <input id="time" type="datetime-local">
  <button onclick="createEvent()">Create</button>

  <h3>Your Events</h3>
  <div id="list"></div>

</div>

<!-- PUBLIC -->
<div id="public" style="display:none">
  <h1 id="eventTitle"></h1>
  <div id="timer"></div>
</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyA7SH4jNcMnnNi_zH8q-JVjSsS2zQ912yk",
  authDomain: "countdown-6308f.firebaseapp.com",
  databaseURL: "https://countdown-6308f-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "countdown-6308f"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let currentEvent = null;

// LOGIN
function login(){
  auth.signInWithEmailAndPassword(email.value, password.value)
  .then(showDashboard);
}

// DASHBOARD
function showDashboard(){
  loginBox.style.display="none";
  dashboard.style.display="block";
  loadEvents();
}

// CREATE EVENT
function createEvent(){
  const id = "ev_" + Date.now();

  db.ref("events/"+id).set({
    title: title.value,
    endTime: time.value,
    uid: auth.currentUser.uid
  });

  loadEvents();
}

// LOAD EVENTS
function loadEvents(){
  db.ref("events").on("value", snap=>{
    const data = snap.val();
    list.innerHTML = "";

    for(let id in data){
      const e = data[id];

      if(e.uid === auth.currentUser.uid){
        list.innerHTML += `
          <div class="card">
            <b>${e.title}</b><br>
            <a href="?id=${id}">Open</a>
          </div>
        `;
      }
    }
  });
}

// PUBLIC VIEW
function loadPublic(id){
  db.ref("events/"+id).once("value", snap=>{
    const e = snap.val();
    if(!e) return;

    loginBox.style.display="none";
    dashboard.style.display="none";
    public.style.display="block";

    eventTitle.innerText = e.title;

    setInterval(()=>{

      const diff = new Date(e.endTime) - new Date();

      if(diff <= 0){
        timer.innerText = "🎉 DONE";
        return;
      }

      const d = Math.floor(diff/86400000);
      const h = Math.floor(diff%86400000/3600000);
      const m = Math.floor(diff%3600000/60000);
      const s = Math.floor(diff%60000/1000);

      timer.innerText = `${d}d ${h}h ${m}m ${s}s`;

    },1000);
  });
}

// ROUTER
const params = new URLSearchParams(location.search);
if(params.get("id")){
  loadPublic(params.get("id"));
}

</script>

</body>
</html>
